# Docker Compose override for smoke tests.
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d
#
# Adds an LLMock server and wires the web container to use it
# instead of a real LLM provider.

services:
  # Override host ports to avoid conflicts with a running dev stack
  db:
    ports: !override
      - "127.0.0.1:5499:5432"

  redis:
    ports: !override
      - "127.0.0.1:6399:6379"

  llmock:
    image: docker.io/library/node:22-alpine
    restart: "no"
    volumes:
      - ./scripts/llmock-server.mjs:/app/llmock-server.mjs:ro
    command: ["node", "/app/llmock-server.mjs"]
    environment:
      LLMOCK_PORT: "19876"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:19876/health"]
      interval: 2s
      timeout: 2s
      retries: 10

  web:
    depends_on:
      db:
        condition: service_healthy
      llmock:
        condition: service_healthy
    environment:
      # Point Anthropic SDK at the mock server
      ANTHROPIC_BASE_URL: http://llmock:19876
      ANTHROPIC_API_KEY: test-smoke-key
      # Ensure the provider is anthropic for deterministic behavior
      NODE_ENV: production
      SELF_HOSTED: "false"
      # Skip CLI install to speed up container start
