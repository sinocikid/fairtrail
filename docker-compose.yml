# Fairtrail — Self-Hosted Flight Price Tracker
# Quick start: cp .env.example .env → edit API key → docker compose up -d
#
# Docs: https://github.com/AFromero/fairtrail

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fairtrail
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis is optional — improves performance with response caching.
  # Comment out this service and unset REDIS_URL in .env to run without it.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-3003}:3003"
    env_file: .env
    environment:
      # Override with docker-compose internal networking
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/fairtrail
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CHROME_PATH: /usr/bin/chromium-browser
      NODE_ENV: production
      SELF_HOSTED: "true"
      # Force internal port to 3003 — env_file leaks PORT into the container,
      # making Next.js bind to the wrong port (e.g. 80 instead of 3003)
      PORT: "3003"
    volumes:
      - app-data:/app/data
      # Uncomment to use Claude Code CLI from your host machine:
      # - ~/.claude:/home/node/.claude:ro
      # Uncomment to use Codex CLI from your host machine:
      # - ~/.codex:/home/node/.codex:ro

volumes:
  pgdata:
  redisdata:
  app-data:
