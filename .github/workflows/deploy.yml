name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p "require('./apps/web/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: publish
    runs-on: ubuntu-latest
    outputs:
      deploy_status: ${{ steps.deploy.outcome }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: REPO_TOKEN,DOPPLER_PRD_TOKEN
          script: |
            set -e
            cd ~/fairtrail

            echo "Pulling latest code..."
            git remote set-url origin "https://x-access-token:${REPO_TOKEN}@github.com/affromero/fairtrail.git"
            git pull origin main

            echo "Syncing Caddy config..."
            sudo cp ~/fairtrail/Caddyfile /etc/caddy/conf.d/fairtrail.org
            sudo caddy reload --config /etc/caddy/Caddyfile --force

            echo "Generating .env from Doppler..."
            if ! command -v doppler &>/dev/null; then
              curl -Ls --tlsv1.2 --proto "=https" --retry 3 https://cli.doppler.com/install.sh | sudo sh
            fi
            DOPPLER_TOKEN="${DOPPLER_PRD_TOKEN}" doppler secrets download --no-file --format env-no-quotes > ~/fairtrail/.env

            echo "Writing systemd env file..."
            mkdir -p ~/.config/fairtrail
            DOPPLER_TOKEN="${DOPPLER_PRD_TOKEN}" doppler secrets get CRON_SECRET --plain > /tmp/ft-cron-env
            echo "CRON_SECRET=$(cat /tmp/ft-cron-env)" > ~/.config/fairtrail/env
            chmod 600 ~/.config/fairtrail/env
            rm -f /tmp/ft-cron-env

            echo "Pulling published image..."
            docker compose -f docker-compose.prod.yml pull web

            echo "Starting infra services..."
            docker compose -f docker-compose.prod.yml up -d --no-recreate db redis

            echo "Waiting for postgres to accept connections..."
            for i in $(seq 1 15); do
              if docker compose -f docker-compose.prod.yml exec -T db pg_isready -U postgres -q 2>/dev/null; then
                echo "Postgres ready (attempt $i)"
                break
              fi
              echo "Attempt $i/15 — postgres not ready"
              sleep 2
              if [ "$i" -eq 15 ]; then
                echo "Postgres failed to start after 30s"
                exit 1
              fi
            done

            echo "Running Prisma migrations..."
            for i in $(seq 1 3); do
              if docker compose -f docker-compose.prod.yml run --rm --no-deps --entrypoint "" web npx prisma db push --accept-data-loss --schema=apps/web/prisma/schema.prisma; then
                echo "Prisma migrations applied (attempt $i)"
                break
              fi
              echo "Prisma attempt $i/3 failed — retrying in 5s..."
              sleep 5
              if [ "$i" -eq 3 ]; then
                echo "Prisma migrations failed after 3 attempts"
                exit 1
              fi
            done

            echo "Restarting web..."
            docker compose -f docker-compose.prod.yml up -d --force-recreate --no-deps --remove-orphans web

            echo "Waiting for health check..."
            for i in $(seq 1 12); do
              sleep 10
              HEALTH=$(curl -sf http://localhost:3003/api/health 2>/dev/null || echo "")
              if [ -n "$HEALTH" ]; then
                echo "Health check passed (attempt $i): $HEALTH"
                break
              fi
              echo "Attempt $i/12 — not ready yet"
              if [ "$i" -eq 12 ]; then
                echo "Health check failed after 120s"
                docker compose -f docker-compose.prod.yml logs --tail=50 web
                exit 1
              fi
            done

            echo "Syncing systemd timer..."
            sudo cp ~/fairtrail/infra/fairtrail-scrape.service /etc/systemd/system/
            sudo cp ~/fairtrail/infra/fairtrail-scrape.timer /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable --now fairtrail-scrape.timer

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Deploy complete!"
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          DOPPLER_PRD_TOKEN: ${{ secrets.DOPPLER_PRD_TOKEN }}

  notify:
    name: Telegram Notification
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Notify via Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_STATUS: ${{ needs.deploy.outputs.deploy_status || needs.deploy.result }}
        run: |
          COMMIT_MSG=$(git log -1 --format='%s')
          COMMIT_SHA=$(git log -1 --format='%h')
          PREV_SHA=$(git log -1 --format='%h' HEAD~1)
          AUTHOR=$(git log -1 --format='%an')

          if [ "$DEPLOY_STATUS" = "success" ]; then
            EMOJI="✅"
            STATUS="deployed"
          else
            EMOJI="❌"
            STATUS="deploy failed"
          fi

          HEALTH_LINE=""
          if [ "$DEPLOY_STATUS" = "success" ]; then
            HEALTH=$(curl -sf --max-time 5 "https://fairtrail.org/api/health" 2>/dev/null || echo "")
            if [ -n "$HEALTH" ]; then
              HEALTH_LINE="Health: ✅ live"
            else
              HEALTH_LINE="Health: ⚠️ unreachable"
            fi
          fi

          NL=$'\n'
          TEXT="${EMOJI} <b>fairtrail.org ${STATUS}</b>${NL}"
          TEXT="${TEXT}<code>${PREV_SHA}</code> → <code>${COMMIT_SHA}</code>  <i>${COMMIT_MSG}</i>${NL}"
          TEXT="${TEXT}by ${AUTHOR}"

          [ -n "$HEALTH_LINE" ] && TEXT="${TEXT}${NL}${NL}<blockquote>${HEALTH_LINE}</blockquote>"

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEXT="${TEXT}${NL}<a href=\"https://fairtrail.org\">fairtrail.org</a>  ·  <a href=\"${RUN_URL}\">Run</a>"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "$TEXT" \
              '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}')"
